services:
  backend:
    build:
      context: ./backend
    container_name: minipruefprotokoll-backend
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_URLS=http://+:8080

  frontend:
    build:
      context: ./frontend
    container_name: minipruefprotokoll-frontend
    ports:
      - "4200:80"
    depends_on:
      - backend
