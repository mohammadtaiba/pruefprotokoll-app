services:
  postgres:
    image: postgres:16-alpine
    container_name: pruefprotokoll-postgres
    environment:
      POSTGRES_DB: inspectionreports
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d inspectionreports"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: pruefprotokoll-backend
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=inspectionreports;Username=postgres;Password=postgres
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: pruefprotokoll-frontend
    ports:
      - "4200:80"
    depends_on:
      - backend

volumes:
  postgres_data:
